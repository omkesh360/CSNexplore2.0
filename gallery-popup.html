<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Popup Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz@20..48" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .gallery-item { cursor: pointer; position: relative; overflow: hidden; border-radius: 8px; aspect-ratio: 1; background: #e0e0e0; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-item::after { content: '🔍'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; background: rgba(0,0,0,0); transition: background 0.3s; }
        .gallery-item:hover::after { background: rgba(0,0,0,0.3); }

        /* POPUP MODAL */
        .gallery-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; }
        .gallery-modal.active { display: flex; }
        
        .modal-content { position: relative; background: white; border-radius: 12px; padding: 20px; max-width: 90vw; max-height: 90vh; display: flex; flex-direction: column; align-items: center; }
        .modal-content img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 8px; }
        
        .modal-close { position: absolute; top: 15px; right: 15px; background: #ec5b13; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .modal-close:hover { background: #d94a0a; transform: scale(1.1); }
        
        .modal-nav { position: absolute; top: 50%; transform: translateY(-50%); background: #ec5b13; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .modal-nav:hover { background: #d94a0a; transform: translateY(-50%) scale(1.1); }
        .modal-prev { left: 15px; }
        .modal-next { right: 15px; }
        
        .modal-counter { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: #ec5b13; color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        
        .zoom-controls { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 8px; }
        .zoom-btn { background: #ec5b13; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .zoom-btn:hover { background: #d94a0a; transform: scale(1.1); }
        
        .modal-content img.zoomed { max-width: none; max-height: none; width: auto; height: auto; }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 30px;">Gallery Popup Demo</h1>
    
    <div class="gallery-grid" id="gallery">
        <div class="gallery-item" onclick="openGallery(0)">
            <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400&q=80" alt="Car 1">
        </div>
        <div class="gallery-item" onclick="openGallery(1)">
            <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80" alt="Bike 1">
        </div>
        <div class="gallery-item" onclick="openGallery(2)">
            <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&q=80" alt="Hotel 1">
        </div>
        <div class="gallery-item" onclick="openGallery(3)">
            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400&q=80" alt="Restaurant 1">
        </div>
    </div>

    <!-- POPUP MODAL -->
    <div class="gallery-modal" id="galleryModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeGallery()">✕</button>
            <button class="modal-nav modal-prev" onclick="prevImage()">❮</button>
            <img id="modalImage" src="" alt="Gallery image">
            <button class="modal-nav modal-next" onclick="nextImage()">❯</button>
            <div class="modal-counter"><span id="imageCounter">1</span> / <span id="totalImages">4</span></div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
                <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
            </div>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let images = [];
        let zoomLevel = 1;

        function initGallery() {
            const items = document.querySelectorAll('.gallery-item img');
            images = Array.from(items).map(img => img.src);
            document.getElementById('totalImages').textContent = images.length;
        }

        function openGallery(index) {
            currentIndex = index;
            zoomLevel = 1;
            const modal = document.getElementById('galleryModal');
            const img = document.getElementById('modalImage');
            img.src = images[currentIndex];
            img.classList.remove('zoomed');
            img.style.transform = 'scale(1)';
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            updateCounter();
        }

        function closeGallery() {
            document.getElementById('galleryModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            zoomLevel = 1;
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            zoomLevel = 1;
            const img = document.getElementById('modalImage');
            img.src = images[currentIndex];
            img.classList.remove('zoomed');
            img.style.transform = 'scale(1)';
            updateCounter();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            zoomLevel = 1;
            const img = document.getElementById('modalImage');
            img.src = images[currentIndex];
            img.classList.remove('zoomed');
            img.style.transform = 'scale(1)';
            updateCounter();
        }

        function zoomIn() {
            zoomLevel = Math.min(zoomLevel + 0.2, 3);
            updateZoom();
        }

        function zoomOut() {
            zoomLevel = Math.max(zoomLevel - 0.2, 1);
            updateZoom();
        }

        function updateZoom() {
            const img = document.getElementById('modalImage');
            if (zoomLevel > 1) {
                img.classList.add('zoomed');
                img.style.transform = `scale(${zoomLevel})`;
            } else {
                img.classList.remove('zoomed');
                img.style.transform = 'scale(1)';
            }
        }

        function updateCounter() {
            document.getElementById('imageCounter').textContent = currentIndex + 1;
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('galleryModal');
            if (!modal.classList.contains('active')) return;
            if (e.key === 'Escape') closeGallery();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // Close on backdrop click
        document.getElementById('galleryModal').addEventListener('click', (e) => {
            if (e.target.id === 'galleryModal') closeGallery();
        });

        // Initialize
        initGallery();
    </script>
</body>
</html>
