<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple Vendor Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .test-box { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { background: #ec5b13; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #d44e0e; }
        pre { background: #fff; padding: 15px; border-radius: 5px; overflow-x: auto; max-height: 300px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
    </style>
</head>
<body>
    <h1>🧪 Test Simple Vendor Login API</h1>
    
    <div class="test-box">
        <h2>Setup Test Vendor</h2>
        <p style="margin-bottom: 10px; color: #666;">First, create a test vendor account:</p>
        <button onclick="createTestVendor()" style="background: #4CAF50; margin-bottom: 15px;">Create Test Vendor</button>
        <div id="setup-result"></div>
    </div>

    <div class="test-box">
        <h2>Test Credentials</h2>
        <div>
            <input type="text" id="username" placeholder="Username" value="testvendor">
            <input type="password" id="password" placeholder="Password" value="test123">
            <button onclick="testLogin()">Test Login</button>
        </div>
        <div id="result"></div>
    </div>

    <div class="test-box">
        <h2>Raw Response</h2>
        <pre id="raw-response">Click "Test Login" to see response...</pre>
    </div>

    <div class="test-box">
        <h2>Parsed JSON</h2>
        <pre id="parsed-response">Click "Test Login" to see parsed JSON...</pre>
    </div>

    <script>
        async function createTestVendor() {
            const setupResult = document.getElementById('setup-result');
            setupResult.innerHTML = '<p>Creating test vendor...</p>';
            
            try {
                const response = await fetch('php/api/create-test-vendor.php');
                const data = await response.json();
                
                if (data.success) {
                    setupResult.innerHTML = '<p style="color: green; font-weight: bold;">✅ ' + data.message + '</p>';
                    setupResult.innerHTML += '<p>Username: <strong>' + data.username + '</strong></p>';
                    setupResult.innerHTML += '<p>Password: <strong>' + data.password + '</strong></p>';
                    if (data.note) {
                        setupResult.innerHTML += '<p style="color: #666; font-size: 12px; margin-top: 10px;">' + data.note + '</p>';
                    }
                } else {
                    setupResult.innerHTML = '<p style="color: red;">❌ ' + (data.error || 'Failed to create vendor') + '</p>';
                }
            } catch (error) {
                setupResult.innerHTML = '<p style="color: red;">❌ Error: ' + error.message + '</p>';
            }
        }

        async function testLogin() {
            const result = document.getElementById('result');
            const rawResponse = document.getElementById('raw-response');
            const parsedResponse = document.getElementById('parsed-response');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            result.innerHTML = '<p>Testing login...</p>';
            rawResponse.textContent = 'Sending request...';
            parsedResponse.textContent = 'Waiting...';
            
            try {
                console.log('Sending login request to vendor-auth-simple.php');
                
                const response = await fetch('php/api/vendor-auth-simple.php?action=login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                console.log('Response status:', response.status);
                
                const text = await response.text();
                console.log('Raw response:', text);
                rawResponse.textContent = text;

                // Try to parse JSON
                let data;
                try {
                    data = JSON.parse(text);
                    parsedResponse.textContent = JSON.stringify(data, null, 2);
                } catch (e) {
                    parsedResponse.textContent = 'ERROR: Not valid JSON - ' + e.message;
                    result.innerHTML = '<p class="error">❌ Response is not valid JSON</p>';
                    result.innerHTML += '<p>This usually means there\'s a PHP error.</p>';
                    return;
                }

                if (response.ok && data.token) {
                    result.innerHTML = '<p class="success">✅ Login successful!</p>';
                    result.innerHTML += '<p>Vendor: ' + data.vendor.name + '</p>';
                    result.innerHTML += '<p>Token: ' + data.token.substring(0, 50) + '...</p>';
                    
                    // Save to localStorage
                    localStorage.setItem('csn_vendor_token', data.token);
                    localStorage.setItem('csn_vendor_user', JSON.stringify(data.vendor));
                    
                    result.innerHTML += '<p style="color: blue;">✅ Saved to localStorage</p>';
                    result.innerHTML += '<p><a href="vendor/dashboard.php">Go to Vendor Dashboard →</a></p>';
                } else {
                    result.innerHTML = '<p class="error">❌ Login failed</p>';
                    result.innerHTML += '<p>Error: ' + (data.error || 'Unknown error') + '</p>';
                }
            } catch (error) {
                result.innerHTML = '<p class="error">❌ Network error: ' + error.message + '</p>';
                rawResponse.textContent = 'Network error: ' + error.message;
                console.error('Login error:', error);
            }
        }

        // Test on load
        window.addEventListener('load', function() {
            console.log('Page loaded');
            // Auto-test if you want
            // testLogin();
        });
    </script>
</body>
</html>
