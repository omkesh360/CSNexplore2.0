<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login - CSNExplore</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
        <link href="css/main.css" rel="stylesheet" />
    <script>
        // Auto-redirect if already logged in as admin
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const userStr = localStorage.getItem('user');
                if (token && userStr) {
                    const user = JSON.parse(userStr);
                    if (user.role === 'admin' || user.role === 'Admin') {
                        window.location.href = 'admin-dashboard.html';
                    }
                }
            } catch (e) { }
        });
    </script>
    <!-- Link to our pre-compiled local Tailwind CSS -->
    <link href="css/tailwind.css" rel="stylesheet" />
</head>

<body class="bg-slate-50 font-display text-text-main antialiased min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl mb-4">
                    <span class="material-symbols-outlined text-white text-[32px]">admin_panel_settings</span>
                </div>
                <h2 class="text-2xl font-black text-primary">Admin Login</h2>
                <p class="text-sm text-slate-600 mt-2">Enter your credentials to access the admin panel</p>
            </div>

            <div id="login-error" class="hidden mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded-lg">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-red-500">error</span>
                    <p class="text-sm text-red-700 font-medium" id="login-error-text">Invalid credentials</p>
                </div>
            </div>

            <form id="admin-login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-[20px]">email</span>
                        </span>
                        <input id="email" name="email" type="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                            placeholder="admin@travelhub.com" value="admin@travelhub.com">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-[20px]">lock</span>
                        </span>
                        <input id="password" name="password" type="password" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                            placeholder="Enter password" value="admin123">
                    </div>
                </div>

                <button type="submit" id="login-btn"
                    class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">login</span>
                    <span>Login to Admin Panel</span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-slate-600 hover:text-primary font-medium">
                    ← Back to Homepage
                </a>
            </div>
        </div>

        <div class="text-center mt-6 text-sm text-slate-500">
            <p>Default credentials: admin@travelhub.com / admin123</p>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const errorText = document.getElementById('login-error-text');
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span><span>Logging in...</span>';
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                if (data.user.role !== 'admin' && data.user.role !== 'Admin') {
                    throw new Error('Access denied. Admin privileges required.');
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                window.location.href = 'admin-dashboard.html';

            } catch (error) {
                errorText.textContent = error.message;
                errorDiv.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span class="material-symbols-outlined">login</span><span>Login to Admin Panel</span>';
            }
        });
    </script>
    <script src="js/booking-popup.js"></script>
</body>

</html>
