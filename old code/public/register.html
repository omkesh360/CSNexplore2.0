<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Join CSNExplore - Create Account</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
        <link href="css/main.css" rel="stylesheet" />
    <link href="css/responsive-optimizations.css" rel="stylesheet" />
    <!-- Link to our pre-compiled local Tailwind CSS -->
    <link href="css/tailwind.css" rel="stylesheet" />
</head>

<body class="bg-white font-display text-text-main antialiased min-h-screen overflow-hidden">
    <div class="flex min-h-screen">
        <!-- Left Side: Register Form -->
        <div
            class="w-full lg:w-1/2 flex flex-col justify-center items-center px-6 md:px-12 py-12 bg-background-light relative overflow-y-auto">

            <!-- Mobile Logo -->
            <div class="lg:hidden absolute top-8 left-8">
                <a href="index.html">
                    <img loading="lazy" decoding="async" src="/images/travelhub.png" alt="CSNExplore" class="h-8">
                </a>
            </div>

            <div class="w-full max-w-md space-y-8">
                <div class="text-center lg:text-left">
                    <h2 class="text-3xl font-extrabold text-text-main tracking-tight md:text-4xl">Start your journey
                    </h2>
                    <p class="mt-3 text-text-muted font-medium">
                        Already have an account?
                        <a href="login.html"
                            class="text-primary hover:text-primary-hover font-bold transition-all border-b-2 border-primary/20 hover:border-primary">Sign
                            in here</a>
                    </p>
                </div>

                <div class="mt-8">
                    <form id="registration-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label for="first-name"
                                    class="text-xs font-bold text-text-main ml-1 uppercase tracking-wider">First
                                    Name</label>
                                <input id="first-name" name="first-name" type="text" required
                                    class="block w-full px-4 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all shadow-sm"
                                    placeholder="John">
                            </div>
                            <div class="space-y-1">
                                <label for="last-name"
                                    class="text-xs font-bold text-text-main ml-1 uppercase tracking-wider">Last
                                    Name</label>
                                <input id="last-name" name="last-name" type="text" required
                                    class="block w-full px-4 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all shadow-sm"
                                    placeholder="Doe">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label for="email"
                                class="text-xs font-bold text-text-main ml-1 uppercase tracking-wider">Email
                                address</label>
                            <div class="relative group">
                                <span
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
                                    <span
                                        class="material-symbols-outlined text-[20px] text-gray-400">alternate_email</span>
                                </span>
                                <input id="email" name="email" type="email" autocomplete="email" required
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all shadow-sm"
                                    placeholder="john@example.com">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label for="password"
                                class="text-xs font-bold text-text-main ml-1 uppercase tracking-wider">Create
                                Password</label>
                            <div class="relative group">
                                <span
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
                                    <span class="material-symbols-outlined text-[20px] text-gray-400">lock</span>
                                </span>
                                <input id="password" name="password" type="password" required
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary sm:text-sm transition-all shadow-sm"
                                    placeholder="Min. 8 characters">
                            </div>
                        </div>

                        <div class="flex items-start mt-4">
                            <div class="flex items-center h-5">
                                <input id="terms" name="terms" type="checkbox" required
                                    class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded-md">
                            </div>
                            <div class="ml-3 text-sm">
                                <label for="terms" class="font-medium text-text-muted">
                                    I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms of
                                        Service</a> and <a href="#"
                                        class="text-primary font-bold hover:underline">Privacy Policy</a>
                                </label>
                            </div>
                        </div>

                        <div class="pt-2">
                            <button type="submit"
                                class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transform transition-all active:scale-[0.98] hover:shadow-primary/30">
                                Create Account
                            </button>
                        </div>
                    </form>
                </div>

                <div class="mt-auto pt-8 text-center text-xs text-text-muted">
                    <p>© 2026 CSNExplore. All rights reserved.</p>
                </div>
            </div>
        </div>

        <!-- Right Side: Image & Branding (Hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-primary text-right">
            <img loading="lazy" decoding="async" src="/images/register-bg.png" alt="Travel Background"
                class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-80 scale-105 animate-slow-zoom">
            <div class="absolute inset-0 bg-gradient-to-tl from-primary/60 to-transparent"></div>

            <div class="relative z-10 w-full p-12 flex flex-col justify-between items-end">
                <a href="index.html" class="flex items-center gap-2">
                    <img loading="lazy" decoding="async" src="/images/travelhub.png" alt="CSNExplore" class="h-10 brightness-0 invert">
                </a>

                <div class="max-w-md">
                    <h1 class="text-5xl font-black text-white leading-tight mb-6 tracking-tight">Expand your horizons.
                    </h1>
                    <p class="text-xl text-white/80 font-medium">Unlock exclusive deals, personalized itineraries, and
                        24/7 travel support when you join our global community.</p>
                </div>

                <div class="flex items-center gap-6 text-white/60 text-sm font-medium">
                    <span class="flex items-center gap-2">Join 10,000+ Travelers <span
                            class="material-symbols-outlined text-[18px]">public</span></span>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes slow-zoom {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .animate-slow-zoom {
            animation: slow-zoom 20s linear infinite alternate;
        }
    </style>

    <script src="js/app.js"></script>
        <script src="js/booking-popup.js"></script>
</body>

</html>
