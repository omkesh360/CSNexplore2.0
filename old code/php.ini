; PHP Configuration for TravelHub

; Error handling
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL
log_errors = On
error_log = /tmp/php_errors.log

; File uploads
file_uploads = On
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Performance
max_execution_time = 30
max_input_time = 60
memory_limit = 128M

; Session
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1

; Timezone
date.timezone = UTC
