<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vendor Login API</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-section { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { background: #ec5b13; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #d44e0e; }
        pre { background: #fff; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
    </style>
</head>
<body>
    <h1>🧪 Vendor Login API Test</h1>
    
    <div class="test-section">
        <h2>Step 0: Test Minimal API (No Dependencies)</h2>
        <button onclick="testMinimalApi()">Test Minimal API</button>
        <div id="minimal-result"></div>
    </div>

    <div class="test-section">
        <h2>Step 1: Check if vendors table exists</h2>
        <button onclick="checkVendorsTable()">Check Vendors Table</button>
        <div id="table-result"></div>
    </div>

    <div class="test-section">
        <h2>Step 2: Test Vendor Login</h2>
        <div>
            <input type="text" id="test-username" placeholder="Username" value="testvendor">
            <input type="password" id="test-password" placeholder="Password" value="test123">
            <button onclick="testLogin()">Test Login</button>
        </div>
        <div id="login-result"></div>
    </div>

    <div class="test-section">
        <h2>Step 3: Check PHP Error Logs</h2>
        <p>Check the file: <code>logs/php_errors.log</code></p>
        <p>Look for lines starting with <code>[Vendor Auth]</code></p>
    </div>

    <div class="test-section">
        <h2>Quick Links</h2>
        <a href="test-api-direct.php"><button>Run Direct PHP Test</button></a>
        <a href="test-vendor-login.php"><button>Run PHP Test Script</button></a>
        <a href="admin/vendors.php"><button>Admin Vendors Page</button></a>
        <a href="vendor/vendorlogin.php"><button>Vendor Login Page</button></a>
    </div>

    <script>
        async function testMinimalApi() {
            const result = document.getElementById('minimal-result');
            result.innerHTML = '<p>Testing minimal API...</p>';
            
            try {
                const response = await fetch('php/api/test-minimal.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({test: 'data'})
                });

                const text = await response.text();
                console.log('Minimal API response:', text);

                const data = JSON.parse(text);
                
                if (data.success) {
                    result.innerHTML = '<p class="success">✅ Minimal API working!</p>';
                    result.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    result.innerHTML = '<p class="error">❌ Unexpected response</p>';
                    result.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                result.innerHTML = '<p class="error">❌ Error: ' + error.message + '</p>';
                console.error('Minimal API error:', error);
            }
        }

        async function checkVendorsTable() {
            const result = document.getElementById('table-result');
            result.innerHTML = '<p>Checking...</p>';
            
            try {
                const response = await fetch('test-vendor-login.php');
                const html = await response.text();
                
                if (html.includes('Vendors Table Exists')) {
                    result.innerHTML = '<p class="success">✅ Vendors table exists!</p>';
                    result.innerHTML += '<p>Open <a href="test-vendor-login.php" target="_blank">test-vendor-login.php</a> to see details</p>';
                } else {
                    result.innerHTML = '<p class="error">❌ Vendors table not found</p>';
                    result.innerHTML += '<p>Run the database migration first!</p>';
                }
            } catch (error) {
                result.innerHTML = '<p class="error">❌ Error: ' + error.message + '</p>';
            }
        }

        async function testLogin() {
            const result = document.getElementById('login-result');
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            
            result.innerHTML = '<p>Testing login...</p>';
            
            try {
                console.log('Sending login request...');
                const response = await fetch('php/api/vendor-auth.php?action=login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                const text = await response.text();
                console.log('Response text:', text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    result.innerHTML = '<p class="error">❌ Invalid JSON response</p>';
                    result.innerHTML += '<pre>' + text.substring(0, 500) + '</pre>';
                    return;
                }

                if (response.ok && data.token) {
                    result.innerHTML = '<p class="success">✅ Login successful!</p>';
                    result.innerHTML += '<p>Vendor: ' + data.vendor.name + '</p>';
                    result.innerHTML += '<p>Token: <code>' + data.token.substring(0, 50) + '...</code></p>';
                    result.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    result.innerHTML = '<p class="error">❌ Login failed</p>';
                    result.innerHTML += '<p>Error: ' + (data.error || 'Unknown error') + '</p>';
                    result.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                result.innerHTML = '<p class="error">❌ Error: ' + error.message + '</p>';
                console.error('Login error:', error);
            }
        }

        // Auto-check on load
        window.addEventListener('load', function() {
            console.log('Page loaded, running tests...');
            testMinimalApi();
            setTimeout(checkVendorsTable, 1000);
        });
    </script>
</body>
</html>
